version: 1
kind: search_spec
metadata:
  phase: benchmark
  description: "Narrow maintained benchmark search spec for EXECUTION_FRICTION (SPREAD_BLOWOUT) context comparison."
search_mode: subset

triggers:
  events:
    - SPREAD_BLOWOUT

contexts:
  vol_regime: [high, normal]

templates:
  - mean_reversion
horizons:
  - 15m
directions:
  - long
  - short
entry_lag:
  - 1
cost_profiles:
  - standard
