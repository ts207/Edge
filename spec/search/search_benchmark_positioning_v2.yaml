version: 1
kind: search_spec
metadata:
  phase: benchmark
  description: "Narrow maintained benchmark search spec for POSITIONING_EXTREMES (DELEVERAGING_WAVE) context comparison."
search_mode: subset

triggers:
  events:
    - DELEVERAGING_WAVE

contexts:
  vol_regime: [high, normal]

templates:
  - mean_reversion
horizons:
  - 15m
directions:
  - long
  - short
entry_lag:
  - 1
cost_profiles:
  - standard
