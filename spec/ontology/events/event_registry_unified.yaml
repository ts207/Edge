version: 1
kind: event_unified_registry
metadata:
  status: authoritative
  legacy_sources:
    event_defaults: spec/events/_defaults.yaml
    event_family_defaults: spec/events/_families.yaml
    event_specs_dir: spec/events
    canonical_event_registry: spec/events/canonical_event_registry.yaml
    template_registry: spec/templates/event_template_registry.yaml
  notes: Single event-centric schema for phase1+phase2 composition. Legacy specs retained
    for compatibility and drift checks.
defaults:
  parameters:
    merge_gap_bars: 1
    cooldown_bars: 0
    anchor_rule: max_intensity
    min_occurrences: 0
  templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - pullback_entry
  horizons:
  - 5m
  - 15m
  - 60m
  conditioning_cols:
  - vol_regime
  - carry_state
  - funding_bps
  - ms_trend_state
  - ms_spread_state
  - severity_bucket
  max_candidates_per_run: 1000
families:
  EXECUTION_FRICTION:
    parameters: {}
    templates:
    - slippage_aware_filter
    - tail_risk_avoid
  FORCED_FLOW_AND_EXHAUSTION:
    parameters: {}
    templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - drawdown_filter
  INFORMATION_DESYNC:
    parameters: {}
    templates:
    - desync_repair
    - convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
  LIQUIDITY_DISLOCATION:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
  POSITIONING_EXTREMES:
    parameters: {}
    templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
  REGIME_TRANSITION:
    parameters: {}
    templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
  STATISTICAL_DISLOCATION:
    parameters: {}
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
  TEMPORAL_STRUCTURE:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
  TREND_STRUCTURE:
    parameters: {}
    templates:
    - breakout_followthrough
    - false_breakout_reversal
    - pullback_entry
    - trend_continuation
    - continuation
    - only_if_trend
  VOLATILITY_TRANSITION:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - trend_continuation
    - volatility_expansion_follow
    - pullback_entry
    - only_if_regime
events:
  ABSORPTION_EVENT:
    canonical_family: LIQUIDITY_DISLOCATION
    reports_dir: liquidity_dislocation
    events_file: liquidity_dislocation_events.parquet
    signal_column: absorption_event
    parameters:
      lookback_window: 288
      z_threshold: 3.0
      cooldown_bars: 12
      merge_gap_bars: 0
      min_volume_quantile: 0.2
    templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
