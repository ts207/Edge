stress_scenarios:
- name: HIGH_VOL_SHOCK
  description: Top decile realized vol (rv_pct_17280 > 0.9)
  feature: rv_pct_17280
  operator: '>'
  threshold: 0.9
- name: WIDE_SPREAD
  description: "Bid-ask spread 2\u03C3 above median (spread_zscore > 2)"
  feature: spread_zscore
  operator: '>'
  threshold: 2.0
- name: EXTREME_FUNDING
  description: Funding above 0.02% per 8h
  feature: funding_rate
  operator: '>'
  threshold: 0.0002
- name: POST_CRASH
  description: Following a 20bps+ down bar (logret_1 < -0.002)
  feature: logret_1
  operator: <
  threshold: -0.002
- name: LIQUIDATION_ACTIVE
  description: Any liquidation activity in bar
  feature: liquidation_count
  operator: '>'
  threshold: 0.0
