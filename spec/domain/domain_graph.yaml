      parameters:
        synthetic_coverage: covered
        canonical_family: VOLATILITY_TRANSITION
        detector_contract: true
        detector: &id559
          signal_definition: 'Detects realized-volatility shock onset using a point-in-time-safe
            dynamic threshold on the realized-volatility shock ratio. The emitted
            event is the first bar where the shock ratio crosses above the dynamic
            threshold; post-event fields record relaxation and decay diagnostics,
            but the detector does not require a separate bootstrap-confirmed relaxation
            gate before emission.

            '
          formula: 'logret[i]        = log(close[i] / close[i-1])

            realized_vol[i]  = sqrt(mean(logret[i-rv_window+1..i]^2))

            rv_base[i]       = trailing_median(realized_vol, baseline_window, lag=1)[i]

            shock_ratio[i]   = realized_vol[i] / rv_base[i]

            shock_threshold[i] = trailing_quantile(shock_ratio, baseline_window, shock_quantile,
            lag=1)[i]

            onset[i]         = shock_ratio[i-1] < shock_threshold[i-1] AND shock_ratio[i]
            >= shock_threshold[i]

            relax_exit[j]    = first j >= i such that shock_ratio[j] <= relax_threshold
            for relax_consecutive_bars consecutive bars

            event            = onset[i]

            '
          required_columns:
          - timestamp
          - close
          lookback_bars: 288
          warmup_bars: 288
          bar_type: close_to_close
          timestamp_alignment: 'Event anchor at first bar crossing above the dynamic
            shock threshold (shock onset). Detected at bar close; downstream metadata
            records the subsequent relaxation boundary.

            '
          minimum_sample_size: 200
        calibration: &id560
          default_threshold: 2.0
          search_range:
          - 1.5
          - 1.75
          - 2.0
          - 2.25
          - 2.5
          - 3.0
          calibration_target: 'Maximize stability of point-in-time shock-onset detection
            and usefulness of post-event decay telemetry (half-life, excess vol area,
            secondary-shock incidence) while keeping sufficient event counts per window.

            '
          stability_requirement: 'Shock threshold and onset frequency should remain
            stable across yearly splits and major symbols after accounting for realized-vol
            regime differences.

            '
          failure_modes:
          - Flat price series: vol near zero, ratio undefined
          - Persistent high-vol regime: shock threshold never exceeded
          - Insufficient warmup history for trailing median / quantile calibration
        expected_behavior: &id561
          holding_horizon_bars: 8-48
          invalidation_conditions:
          - Realized vol re-expands above shock threshold within phase_tolerance_bars
          - Second shock occurs before first relaxation completes
          false_positive_scenarios:
