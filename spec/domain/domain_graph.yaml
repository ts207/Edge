      strategy_only: false
      default_executable: true
      deconflict_priority: 0
      notes: Thin-book vacuum regime.
      maturity: ''
      tier: A
      operational_role: trigger
      deployment_disposition: primary_trigger_candidate
      runtime_category: active_runtime_event
      enabled: true
      detector_name: LiquidityVacuumDetector
      runtime_tags: &id295
      - liquidity_stress
      - high_urgency
      instrument_classes: &id296
      - crypto
      - futures
      requires_features: &id297 []
      sequence_eligible: true
      reports_dir: liquidity_vacuum
      events_file: liquidity_vacuum_events.parquet
      signal_column: liquidity_vacuum_event
      routing_profile_ref: ''
      cluster_id: liquidity_stress
      collapse_target: ''
      overlap_group: ''
      precedence_rank: 0
      suppresses: &id298
      - &id288
        event_type: VOL_SHOCK
        penalty_factor: 0.5
        block: false
        reason: Vol signal unreliable during thin-book conditions; vol expansion may
          be noise-driven. Partial penalty.
      suppressed_by: &id299 []
      parameters:
        synthetic_coverage: covered
        canonical_family: LIQUIDITY_DISLOCATION
        detector_contract: true
        detector: &id289
          signal_definition: 'Identifies bars where an absolute return shock (abs_return
            >= t_shock) is immediately followed by consecutive bars with below-median
            volume AND above-median intrabar range, indicating liquidity has withdrawn
            post-impulse.

            '
          formula: 'abs_return[i]    = abs(close[i] / close[i-1] - 1)

            vol_ratio[i]     = volume[i] / rolling_median(volume, volume_window)[i]

            range_pct[i]     = (high[i] - low[i]) / close[i]

            range_med[i]     = rolling_median(range_pct, range_window)[i]

            shock_onset      = (abs_return[i] >= t_shock) AND (abs_return[i-1] < t_shock)

            vacuum_bar[j]    = (vol_ratio[j] < vol_ratio_floor) AND (range_pct[j]
            > range_multiplier * range_med[j])

            event detected   = shock_onset[i] AND count(vacuum_bar, i+1..i+k) >= min_vacuum_bars

            '
          required_columns:
          - timestamp
          - close
          - high
          - low
          - volume
          lookback_bars: 480
          warmup_bars: 480
          bar_type: bar_close
          timestamp_alignment: 'Event detected_ts = timestamp of last vacuum bar (exit
            bar). Signal available at bar close; no intrabar lookahead.

            '
          minimum_sample_size: 50
        calibration: &id290
          default_threshold: 0.99
          search_range:
          - 0.5
          - 0.6
          - 0.7
          - 0.8
          - 0.9
          - 0.95
          - 0.99
          calibration_target: 'Minimum event count >= min_events_calibration; prefer
            higher quantile.

            '
          stability_requirement: 'Selected threshold must yield >= min_events_calibration
            events on both in-sample and the most recent 12-month rolling window.

            '
          failure_modes:
          - Fewer than 2 * volume_window bars: no valid median, no events
          - All-zero volume: vol_ratio undefined, skip symbol
          - Single-tick instrument: range_pct near zero, detector disabled
        expected_behavior: &id291
          holding_horizon_bars: 1-12
          invalidation_conditions:
          - Volume returns above-median within 1 bar of event end
          - Range compresses below 0.8 * range_med within 2 bars
          false_positive_scenarios:
          - Low-liquidity asset with structurally low volume (always below median)
          - Wide-spread instruments where range_pct baseline is already elevated
          - Post-news window: shock may be informational, not a vacuum
          disabled_regimes:
          - SPREAD_BLOWOUT active: spread already elevated, detector over-fires
          - SCHEDULED_NEWS_WINDOW_EVENT active: directional information event
          expected_overlap:
          - LIQUIDATION_CASCADE: co-occurrence ~15-25%; liquidity withdraws during
              cascade
          - DEPTH_COLLAPSE: high co-occurrence; both detect thin-book conditions
          - VOL_SHOCK: moderate co-occurrence; may precede or co-occur
        trigger: Detector triggers on liquidity vacuum pattern
        confirmation: Post-detection price action confirms signal validity
        cluster_id: liquidity_stress
        profile: lenient
        min_events_calibration: 1
        shock_quantiles: 0.5,0.6,0.7
        def_version: v1
        shock_quantile: 0.99
        shock_threshold_mode: rolling
        volume_window: 24
        range_window: 24
        vol_ratio_floor: 0.95
        range_multiplier: 1.05
        min_vacuum_bars: 1
        max_vacuum_bars: 96
        post_horizon_bars: 96
        auc_horizon_bars: 96
        range_expansion_threshold: 0.02
        merge_gap_bars: 2
        cooldown_bars: 12
        anchor_rule: max_intensity
        min_occurrences: 3
      templates: &id292
      - mean_reversion
