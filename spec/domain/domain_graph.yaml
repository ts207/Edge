- rv_pct_17280
- spread_zscore
- funding_rate
- liquidation_count
- logret_1
- adv_pct_zscore
sequence_definitions:
- name: crowding_unwind
  events:
  - FUNDING_EXTREME_ONSET
  - OI_FLUSH
  - LIQUIDATION_CASCADE
  max_gap:
  - 6
  - 12
  mode: ordered_strict
- name: compression_breakout
  events:
  - RANGE_COMPRESSION_END
  - BREAKOUT_TRIGGER
  - FALSE_BREAKOUT
  max_gap:
  - 12
  - 6
  mode: ordered_strict
- name: liquidity_stress_repair
  events:
  - SPREAD_BLOWOUT
  - ABSORPTION_EVENT
  max_gap:
  - 6
  mode: ordered_strict
- name: vol_forced_unwind_cascade
  events:
  - VOL_SHOCK
  - FUNDING_EXTREME_ONSET
  - LIQUIDATION_CASCADE
  max_gap:
  - 6
  - 12
  mode: ordered_strict
- name: liquidity_cascade_chain
  events:
  - DEPTH_COLLAPSE
  - SPREAD_BLOWOUT
  - ORDERFLOW_IMBALANCE_SHOCK
  max_gap:
  - 6
  - 6
  mode: ordered_strict
- name: regime_recovery
  events:
  - TREND_EXHAUSTION_TRIGGER
  - CHOP_TO_TREND_SHIFT
  - TREND_ACCELERATION
  max_gap:
  - 12
  - 12
  mode: ordered_strict
- name: statistical_reversion_chain
  events:
  - ZSCORE_STRETCH
  - OVERSHOOT_AFTER_SHOCK
  - GAP_OVERSHOOT
  max_gap:
  - 6
  - 6
  mode: ordered_strict
- name: carry_unwind_cycle
  events:
  - FUNDING_PERSISTENCE_TRIGGER
  - DELEVERAGING_WAVE
  - POST_DELEVERAGING_REBOUND
  max_gap:
  - 24
  - 12
  mode: ordered_strict
interaction_definitions:
- name: crowding_liquidity_shock
  left: FUNDING_EXTREME_ONSET
  right: DEPTH_COLLAPSE
  op: confirm
  lag: 6
- name: volatility_expansion_no_spike
  left: BREAKOUT_TRIGGER
  right: VOL_SPIKE
  op: exclude
  lag: 12
- name: systematic_liquidity_stress
  left: BETA_SPIKE_EVENT
  right: LIQUIDITY_VACUUM
  op: and
  lag: 6
