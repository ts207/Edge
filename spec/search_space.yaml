version: 1
kind: search_space

# Unified hypothesis search space.
# Trigger layer covers four types: events, states, transitions, feature_predicates.
# All are first-class search primitives — none is mandatory.
#
# Events remain a high-value trigger family for discrete market shocks.
# States, transitions, and feature predicates cover the rest of the alpha space.

triggers:

  # Discrete market occurrences — drawn from spec/templates/event_template_registry.yaml
  events:
    # Volatility family
    - VOL_SHOCK
    - VOL_SPIKE
    - VOL_CLUSTER_SHIFT
    - RANGE_COMPRESSION_END
    - BREAKOUT_TRIGGER

    # Liquidity family
    - LIQUIDITY_VACUUM # [QUALITY: LOW] - Marginal IG (0.000134)
    - SWEEP_STOPRUN
    - ABSORPTION_EVENT
    - DEPTH_COLLAPSE
    - SPREAD_BLOWOUT

    # Positioning family
    - FUNDING_EXTREME_ONSET
    - FUNDING_FLIP
    - FUNDING_PERSISTENCE_TRIGGER
    - OI_FLUSH
    - LIQUIDATION_CASCADE # [QUALITY: HIGH] - High IG (0.000467)
    - DELEVERAGING_WAVE

    # Forced-flow / exhaustion family
    - FORCED_FLOW_EXHAUSTION
    - TREND_EXHAUSTION_TRIGGER
    - MOMENTUM_DIVERGENCE_TRIGGER
    - CLIMAX_VOLUME_BAR

    # Statistical dislocation family
    - ZSCORE_STRETCH
    - BAND_BREAK
    - OVERSHOOT_AFTER_SHOCK # [QUALITY: MODERATE] - Moderate IG (0.000226)
    - GAP_OVERSHOOT
    - FND_DISLOC
    - BASIS_DISLOC

    # Trend structure family
    - RANGE_BREAKOUT
    - FALSE_BREAKOUT
    - TREND_DECELERATION
    - PULLBACK_PIVOT

    # Information desync family
    - SPOT_PERP_BASIS_SHOCK
    - LEAD_LAG_BREAK
    - CROSS_VENUE_DESYNC

    # Temporal family
    - SESSION_OPEN_EVENT
    - FUNDING_TIMESTAMP_EVENT

  # Persistent regime labels — drawn from spec/states/state_registry.yaml
  # These fire while the state is active, not at a discrete timestamp.
  states:
    # Volatility regimes
    - HIGH_VOL_REGIME
    - LOW_VOL_REGIME
    - AFTERSHOCK_STATE
    - POST_EXPANSION_STATE
    - RELAXATION_STATE
    - COMPRESSION_STATE

    # Positioning regimes
    - CROWDING_STATE
    - FUNDING_PERSISTENCE_STATE
    - DELEVERAGING_STATE

    # Trend structure
    - TRENDING_STATE
    - CHOP_STATE

    # Statistical dislocation
    - STRETCHED_STATE
    - OVERSHOOT_STATE

    # Liquidity
    - LOW_LIQUIDITY_STATE
    - HIGH_FRICTION_STATE

  # State transitions — fire at the moment of regime change
  transitions:
    - { from: LOW_VOL_REGIME,          to: HIGH_VOL_REGIME }
    - { from: HIGH_VOL_REGIME,         to: LOW_VOL_REGIME }
    - { from: CHOP_STATE,              to: TRENDING_STATE }
    - { from: TRENDING_STATE,          to: CHOP_STATE }
    - { from: LOW_LIQUIDITY_STATE,     to: REFILL_LAG_STATE }
    - { from: CROWDING_STATE,          to: FUNDING_NORMALIZATION_STATE }

  # Continuous feature activation — no discrete event required
  feature_predicates:
    - { feature: imbalance_zscore,      operator: ">",  threshold: 2.0 }
    - { feature: imbalance_zscore,      operator: "<",  threshold: -2.0 }
    - { feature: spread_pct,            operator: ">=", threshold: 0.90 }
    - { feature: funding_abs_pct,       operator: ">=", threshold: 0.95 }
    - { feature: rv_percentile_24h,     operator: ">=", threshold: 0.80 }
    - { feature: rv_percentile_24h,     operator: "<=", threshold: 0.20 }
    - { feature: basis_zscore,          operator: ">=", threshold: 1.5 }
    - { feature: basis_zscore,          operator: "<=", threshold: -1.5 }
    - { feature: volume_ratio_15m,      operator: ">=", threshold: 2.0 }
    - { feature: oi_delta_1h_pct,       operator: "<=", threshold: -0.05 }

# Optional context conditioning applied as cross-products with triggers.
# Leave empty to run unconditional search first.
contexts:
  vol_regime:
    - low
    - high
  carry_state:
    - funding_pos
    - funding_neg

# Rule templates to enumerate
templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - exhaustion_reversal
  - momentum_fade
  - pullback_entry
  - overshoot_repair

# Target horizons
horizons:
  - 5m
  - 15m
  - 60m

# Sides to test
directions:
  - long
  - short

# Entry lag options (bars after trigger)
entry_lags:
  - 1
  - 2

# Cost profiles (maps to cost model in configs/fees.yaml)
cost_profiles:
  - standard

# Cross-family state conditioning intersections
conditioning_intersections:
  - CROWDING_STATE + HIGH_VOL_REGIME
  - STRETCHED_STATE + LOW_FRICTION_STATE
