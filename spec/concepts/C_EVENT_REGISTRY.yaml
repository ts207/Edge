concept_id: C_EVENT_REGISTRY
name: Event Registry
definition: deterministic, versioned taxonomy of tradable market situations, with strict separation between EVENT triggers and derived STATE windows.
notes:
  - Runtime detector registration is explicit through project/events/detectors/catalog.py and must stay aligned with ownership and spec registries.
  - Generated detector coverage under docs/generated/detector_coverage.* is an audit artifact and should be regenerated after detector inventory changes.
data_requirements:
  - dataset: events.parquet
    columns: [timestamp, symbol, event_type]
    granularity: event-driven
    min_history_days: 0
metrics:
  - id: prevalence
    name: Event Prevalence (bps)
    formula: count(events) / count(bars) * 10000
  - id: determinism
    name: Trigger Determinism Ratio
    formula: reproduced_count / total_count
tests:
  - id: T_REG_01
    objective: No Lookahead
    criteria: trigger_ts <= data_ts
  - id: T_REG_02
    objective: Cooldown Enforcement
    criteria: min(Δts) >= cooldown
  - id: T_REG_03
    objective: Registry Alignment
    criteria: detector ownership config, runnable registry, and generated detector coverage agree on active event inventory
artifacts:
  - type: registry_code
    path: project/events/registry.py
  - type: registry_loader
    path: project/events/detectors/catalog.py
  - type: table
    path: data/lake/events/events.parquet
  - type: spec
    path: spec/events/canonical_event_registry.yaml
  - type: spec
    path: spec/states/state_registry.yaml
  - type: generated_audit
    path: docs/generated/detector_coverage.md
