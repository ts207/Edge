concept_id: "vol_mean_reversion_v1"
description: "Fades volatility spikes during range-bound regimes."

event_definition:
  event_type: "VOL_SPIKE"
  canonical_family: "VOLATILITY_TRANSITION"
  detection_logic:
    type: "ewma_zscore"
    target_feature: "rv_96"
    lookback: 288
    threshold: 2.5
    dynamic_regime_adjustment: true

market_state:
  required_regimes:
    - "VOL_REGIME_NORMAL"
    - "VOL_REGIME_LOW"
  disallowed_states:
    - "LIQUIDITY_VACUUM"
  custom_filters:
    - feature: "basis_zscore"
      operator: "<"
      value: 1.0

templates:
  base: "mean_reversion_exhaustion_v1"
  overlays:
    - "slippage_aware_filter"
    - "tail_risk_avoid"

parameters:
  horizons_bars: [12, 24, 48]
  risk:
    stop_loss_atr_multipliers: [1.5, 2.0]
    take_profit_atr_multipliers: [2.0, 3.0]
  execution:
    style: "passive_then_cross"
    post_only_preference: true