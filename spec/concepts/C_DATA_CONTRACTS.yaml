concept_id: C_DATA_CONTRACTS
name: Venue Data Contracts
definition: formal specification of venue-specific mechanics and data schemas ensuring correct translation into the research data plane.
notes:
  - Runtime stage contracts must declare optional raw inputs that implementations may read, even when the reads are best-effort enrichments.
  - Canonical feature artifacts for current runs are written under features_feature_schema_v2.
data_requirements:
  - dataset: perp_ohlcv_1m
    columns: [all]
    granularity: 1m
    min_history_days: 0
metrics:
  - id: conformance_rate
    name: Schema Conformance Rate
    formula: count(valid_rows) / total_rows
  - id: monotonicity
    name: Timestamp Monotonicity
    formula: count(ts_t > ts_{t-1}) / total_rows
tests:
  - id: T_CON_01
    objective: OHLCV Schema
    criteria: all non-null core fields
  - id: T_CON_02
    objective: Funding Grid
    criteria: timestamps match UTC 0, 8, 16
  - id: T_CON_03
    objective: Honest Feature Dependencies
    criteria: feature-stage artifact contracts include raw funding, liquidation, and open-interest inputs when implementation may consume them
artifacts:
  - type: schema
    path: project/schemas/feature_schema_v2.json
  - type: logic
    path: project/schemas/data_contracts.py
  - type: contract_registry
    path: project/contracts/pipeline_registry.py
