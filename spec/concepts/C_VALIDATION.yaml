concept_id: C_VALIDATION
name: Validation & Statistical Controls
definition: formal process of converting conditional returns into valid edges using cross-validation and regime partitioning.
dependencies: [C_EVENT_DEFINITIONS, C_MULTIPLICITY_CONTROL]
notes:
  - Promotion-facing artifacts must preserve the canonical normalized candidate contract even when built through fallback paths.
  - A no-candidate bridge stage is a valid validation outcome and should finalize as a successful no-op, not a failed run.
data_requirements:
  - dataset: events.parquet
    columns: [all]
    granularity: event-driven
    min_history_days: 365
metrics:
  - id: after_cost_expectancy
    name: After-Cost Expectancy
    formula: mean(returns - total_costs)
  - id: stability_score
    name: Regime Stability Score
    formula: sum(E[ret | regime_i] > 0) / count(regimes)
tests:
  - id: T_VAL_01
    objective: Edge Contract
    criteria: expectancy > 0 in 3+ regimes
  - id: T_VAL_02
    objective: Bridge No-Op Success
    criteria: empty-candidate validation paths preserve success manifests and do not abort orchestration
artifacts:
  - type: pipeline
    path: project/pipelines/research/phase2_candidate_discovery.py
  - type: pipeline
    path: project/pipelines/research/bridge_evaluate_phase2.py
  - type: report
    path: data/lake/reports/validation/candidate_ranking.csv
