# HYP_INT_BREAKOUT_HIGHVOL_004_BTC12_SHORT_2022_TUNED - BTC breakout/high-vol tuned short isolate
# Program: PROG_FRESH_START_2026Q2 | Author: Codex | Date: 2026-04-01
#
# Data-guided retune from the first interaction slice:
# - raw BREAKOUT_TRIGGER was not a short edge
# - BREAKOUT_TRIGGER confirmed by HIGH_VOL_REGIME flipped positive on the short side
# - the strongest observed forward-return pocket was around 12 bars
# - the effect was materially stronger in 2022 than in 2023
#
# This proposal freezes the interaction and symbol, narrows to the 2022 slice,
# fixes direction to short, and tests a small set of templates coherent with the
# VOLATILITY_TRANSITION family.

program_id: PROG_FRESH_START_2026Q2
objective_name: retail_profitability
promotion_profile: research
run_mode: research

description: >
  BTC-only tuned interaction isolate for BREAKOUT_TRIGGER confirmed by
  HIGH_VOL_REGIME (HYP_INT_BREAKOUT_HIGHVOL_004_BTC12_SHORT_2022_TUNED). This
  run is derived from observed interaction data showing short-side strength in
  the high-vol breakout subset, strongest around a 12-bar horizon and more
  concentrated in 2022 than 2023.

symbols:
  - BTCUSDT

timeframe: 5m
start: "2022-01-01"
end: "2022-12-31"

trigger_space:
  allowed_trigger_types: [INTERACTION]
  interactions:
    include:
      - left: BREAKOUT_TRIGGER
        right: HIGH_VOL_REGIME
        op: CONFIRM
        lag: 3

templates:
  - continuation
  - mean_reversion

horizons_bars:
  - 12

directions:
  - short

entry_lags:
  - 1

contexts: {}

search_control:
  max_hypotheses_total: 10
  max_hypotheses_per_template: 10
  max_hypotheses_per_event_family: 10

discovery_profile: standard
phase2_gate_profile: discovery
