# HYP_INT_BREAKOUT_NOSPIKE_001_BTC24_CONT_BIDIR - BTC breakout without vol spike 24b continuation, both sides
# Program: PROG_FRESH_START_2026Q2 | Author: Codex | Date: 2026-04-01
#
# Mechanism: First bounded interaction probe after enabling interaction
# materialization in phase 2. Tests whether a breakout trigger that is not
# immediately accompanied by a vol spike yields cleaner continuation than a raw
# breakout, with both directions allowed because breakout sign is endogenous.

program_id: PROG_FRESH_START_2026Q2
objective_name: retail_profitability
promotion_profile: research
run_mode: research

description: >
  BTC-only interaction isolate for breakout without vol spike
  (HYP_INT_BREAKOUT_NOSPIKE_001_BTC24_CONT_BIDIR). This run tests the
  BREAKOUT_TRIGGER EXCLUDE VOL_SPIKE motif with 12-minute interaction lag,
  24-bar continuation horizon, and both directions under discovery gates.

symbols:
  - BTCUSDT

timeframe: 5m
start: "2022-01-01"
end: "2023-12-31"

trigger_space:
  allowed_trigger_types: [INTERACTION]
  interactions:
    include:
      - left: BREAKOUT_TRIGGER
        right: VOL_SPIKE
        op: EXCLUDE
        lag: 12

templates:
  - continuation

horizons_bars:
  - 24

directions:
  - long
  - short

entry_lags:
  - 1

contexts: {}

search_control:
  max_hypotheses_total: 20
  max_hypotheses_per_template: 20
  max_hypotheses_per_event_family: 20

discovery_profile: standard
phase2_gate_profile: discovery
