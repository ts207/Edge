# Reset-state bounded discovery contract.
# Frozen research contract:
# - objective: retail after-cost profitability
# - symbol universe: BTCUSDT only
# - timeframe: 5m only
# - discovery slice: 2021-01-01 through 2022-12-31
# - selection slice mirror: 2023-01-01 through 2023-12-31
# - forward evaluation: 2024+ unchanged, quarterly blocks
# - promotion to confirmation requires: non-zero candidate count, positive
#   after-cost expectancy, no mechanical failure, and no immediate sign flip.

program_id: BTC_FAILED_CONT_RESET_2026Q2
objective_name: retail_profitability
promotion_profile: disabled
run_mode: research

description: >
  Reset-state bounded discovery for BTC FAILED_CONTINUATION up-direction
  exhaustions. This proposal freezes one event family, one template family,
  one symbol, and one bar resolution. It tests long exhaustion-reversal
  responses over 24-bar and 48-bar horizons on the 2021-01-01 through
  2022-12-31 discovery slice only.

symbols:
  - BTCUSDT

timeframe: 5m
start: "2021-01-01"
end: "2022-12-31"

trigger_space:
  allowed_trigger_types: [EVENT]
  canonical_regimes:
    - TREND_FAILURE_EXHAUSTION
  events:
    include:
      - event_id: FAILED_CONTINUATION
        event_direction: up

templates:
  - exhaustion_reversal

horizons_bars:
  - 24
  - 48

directions:
  - long

entry_lags:
  - 1

contexts: {}

search_control:
  max_hypotheses_total: 2
  max_hypotheses_per_template: 2
  max_hypotheses_per_event_family: 2

knobs:
  cost_bps: 12.0

discovery_profile: standard
phase2_gate_profile: discovery
