# HYP_INT_FALSEBREAK_BEAR_012_BTC12_SHORT_UPDIR - BTC up-false-breakout confirmed by bear trend, short continuation
# Program: PROG_FRESH_START_2026Q2 | Author: Codex | Date: 2026-04-01
#
# Mechanism: the prior interaction line showed that short-side edge on BTC came
# from failed upward expansion, not generic breakouts. This proposal shifts to a
# new interaction family that expresses that mechanism directly: an upward false
# breakout confirmed by BEAR_TREND_REGIME, traded as short continuation over 12
# bars.

program_id: PROG_FRESH_START_2026Q2
objective_name: retail_profitability
promotion_profile: research
run_mode: research

description: >
  BTC-only interaction isolate for FALSE_BREAKOUT confirmed by
  BEAR_TREND_REGIME (HYP_INT_FALSEBREAK_BEAR_012_BTC12_SHORT_UPDIR). This run
  tests whether failed upward breakouts that occur inside a live bear trend
  support short continuation over 12 bars on the broad 2022 through 2024 Q1
  window.

symbols:
  - BTCUSDT

timeframe: 5m
start: "2022-01-01"
end: "2024-04-01"

trigger_space:
  allowed_trigger_types: [INTERACTION]
  interactions:
    include:
      - left: FALSE_BREAKOUT
        left_direction: up
        right: BEAR_TREND_REGIME
        op: CONFIRM
        lag: 12

templates:
  - continuation

horizons_bars:
  - 12

directions:
  - short

entry_lags:
  - 1

contexts: {}

search_control:
  max_hypotheses_total: 5
  max_hypotheses_per_template: 5
  max_hypotheses_per_event_family: 5

discovery_profile: standard
phase2_gate_profile: discovery
