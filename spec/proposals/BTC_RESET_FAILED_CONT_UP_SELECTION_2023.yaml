# Unchanged selection-slice mirror of BTC_RESET_FAILED_CONT_UP_DISCOVERY_2021_2022.
# This file exists to lock the time split before any discovery result is known.

program_id: BTC_FAILED_CONT_RESET_2026Q2
objective_name: retail_profitability
promotion_profile: disabled
run_mode: research

description: >
  Selection-slice replay of the reset-state BTC FAILED_CONTINUATION discovery
  contract. This proposal is intentionally unchanged from the discovery shape
  except for dates so the 2023 slice can be evaluated without structural drift.

symbols:
  - BTCUSDT

timeframe: 5m
start: "2023-01-01"
end: "2023-12-31"

trigger_space:
  allowed_trigger_types: [EVENT]
  canonical_regimes:
    - TREND_FAILURE_EXHAUSTION
  events:
    include:
      - event_id: FAILED_CONTINUATION
        event_direction: up

templates:
  - exhaustion_reversal

horizons_bars:
  - 24
  - 48

directions:
  - long

entry_lags:
  - 1

contexts: {}

search_control:
  max_hypotheses_total: 2
  max_hypotheses_per_template: 2
  max_hypotheses_per_event_family: 2

knobs:
  cost_bps: 12.0

discovery_profile: standard
phase2_gate_profile: discovery
