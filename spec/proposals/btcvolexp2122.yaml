program_id: btc_obs_2021_2022_campaign
objective: retail_profitability
promotion_profile: disabled

description: >
  Observation-only BTC 2021-2022 campaign focused on volatility expansion,
  breakout continuation, and breakout failure. Use outputs for hypothesis
  formation, not promotion.

symbols: [BTCUSDT]
start: 2021-01-01
end: 2022-12-31
timeframe: 5m

templates: [continuation]

trigger_space:
  allowed_trigger_types: [EVENT]
  events:
    include:
      - VOL_SHOCK
      - RANGE_BREAKOUT
      - FALSE_BREAKOUT
      - BREAKOUT_TRIGGER

horizons_bars: [12, 24, 72]
directions: [long, short]
entry_lags: [1, 2]

search_control:
  max_hypotheses_total: 150
  max_hypotheses_per_template: 80
  max_hypotheses_per_event_family: 100