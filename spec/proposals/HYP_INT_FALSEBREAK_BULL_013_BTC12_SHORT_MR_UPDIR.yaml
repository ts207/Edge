# HYP_INT_FALSEBREAK_BULL_013_BTC12_SHORT_MR_UPDIR - BTC up-false-breakout with bull trend, short mean-reversion
# Program: PROG_FRESH_START_2026Q2 | Author: Codex | Date: 2026-04-01
#
# Mechanism: direct testing showed that FALSE_BREAKOUT up events do not co-occur
# with BEAR_TREND_REGIME, but they do occur densely inside BULL_TREND_REGIME and
# retain a small contrarian short response over 12 bars. This proposal isolates
# that observed branch using an interaction shape that matches the data.

program_id: PROG_FRESH_START_2026Q2
objective_name: retail_profitability
promotion_profile: research
run_mode: research

description: >
  BTC-only interaction isolate for upward FALSE_BREAKOUT co-occurring with
  BULL_TREND_REGIME
  (HYP_INT_FALSEBREAK_BULL_013_BTC12_SHORT_MR_UPDIR). This run tests whether
  up-side false breakouts that occur during an active bull trend support short
  12-bar mean reversion on the broad 2022 through 2024 Q1 window.

symbols:
  - BTCUSDT

timeframe: 5m
start: "2022-01-01"
end: "2024-04-01"

trigger_space:
  allowed_trigger_types: [INTERACTION]
  interactions:
    include:
      - left: FALSE_BREAKOUT
        left_direction: up
        right: BULL_TREND_REGIME
        op: AND
        lag: 12

templates:
  - mean_reversion

horizons_bars:
  - 12

directions:
  - short

entry_lags:
  - 1

contexts: {}

search_control:
  max_hypotheses_total: 5
  max_hypotheses_per_template: 5
  max_hypotheses_per_event_family: 5

discovery_profile: standard
phase2_gate_profile: discovery
