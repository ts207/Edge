# BROAD_POSITIONING_EXTREMES_2022_2023
# Program: PROG_FRESH_START_2026Q2 | Author: Codex | Date: 2026-04-01
#
# Broad family discovery on already ingested 2022-2023 BTC/ETH data for the
# next mechanism family after exhausting LIQUIDITY_STRESS continuations.

program_id: PROG_FRESH_START_2026Q2
objective_name: retail_profitability
promotion_profile: research
run_mode: research

description: >
  BroadDiscovery-equivalent POSITIONING_EXTREMES family run on pre-ingested
  2022-2023 BTC/ETH data. This is the next-family pivot after exhausting the
  LIQUIDITY_STRESS continuation branch.

symbols:
  - BTCUSDT
  - ETHUSDT

timeframe: 5m
start: "2022-01-01"
end: "2023-12-31"

trigger_space:
  allowed_trigger_types: [EVENT]
  events:
    include:
      - DELEVERAGING_WAVE
      - FUNDING_EXTREME_ONSET
      - FUNDING_FLIP
      - FUNDING_NORMALIZATION_TRIGGER
      - FUNDING_PERSISTENCE_TRIGGER
      - LIQUIDATION_CASCADE
      - LIQUIDATION_EXHAUSTION_REVERSAL
      - OI_FLUSH
      - OI_SPIKE_NEGATIVE
      - OI_SPIKE_POSITIVE

templates:
  - mean_reversion
  - continuation
  - trend_continuation

horizons_bars:
  - 12
  - 24

directions:
  - long
  - short

entry_lags:
  - 1

contexts: {}

avoid_region_keys: []

search_control:
  max_hypotheses_total: 5000
  max_hypotheses_per_template: 500
  max_hypotheses_per_event_family: 5000
  random_seed: 42
