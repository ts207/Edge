event_type: CROSS_ASSET_DESYNC_EVENT
synthetic_coverage: covered
reports_dir: cross_asset_desync
events_file: cross_asset_desync_events.parquet
signal_column: cross_asset_desync_event
canonical_family: INFORMATION_DESYNC
detector_contract: true

parameters:
  lookback_window: 2880
  threshold_z: 3.0
  revert_z: 0.5
  window_end: 12

detector:
  signal_definition: >
    Detects price desynchronization between two historically correlated assets.
    Triggered when the basis (difference in log returns) exceeds a rolling
    z-score threshold.
  formula: |
    ret_a[i]       = log(close_a[i] / close_a[i-1])
    ret_b[i]       = log(close_b[i] / close_b[i-1])
    basis[i]       = ret_a[i] - ret_b[i]
    basis_z[i]     = (basis[i] - mean(basis, window)) / std(basis, window)
    event onset    = abs(basis_z[i]) >= threshold_z
  required_columns:
    - timestamp
    - close
  optional_columns:
    - pair_close
  lookback_bars: 2880
  warmup_bars: 2880
  bar_type: bar_close

expected_behavior:
  holding_horizon_bars: 1-12
  invalidation_conditions:
    - Basis continues expanding beyond 2x onset z-score
  false_positive_scenarios:
    - News events affecting only one asset in the pair
    - Low liquidity periods where spreads are wide
