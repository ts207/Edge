  CROSS_ASSET_DESYNC_EVENT:
    canonical_family: CROSS_ASSET_DESYNCHRONIZATION
    canonical_regime: CROSS_ASSET_DESYNCHRONIZATION
    legacy_family: CROSS_ASSET_DESYNC_EVENT
    subtype: cross_asset_desync
    phase: divergence
    evidence_mode: inferred_cross_asset
    layer: canonical
    disposition: keep
    asset_scope: cross_asset
    venue_scope: multi_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 90
    notes: First-class cross-asset desynchronization regime.
    reports_dir: cross_asset_desync_event
    events_file: cross_asset_desync_event_events.parquet
    signal_column: cross_asset_desync_event
    parameters:
      synthetic_coverage: covered
      canonical_family: CROSS_ASSET_DESYNCHRONIZATION
      detector_contract: true
      causal_mechanism: When two historically linked assets stop moving together,
        one leg may be lagging price discovery or absorbing flow asymmetrically. The
        contract only fires when the divergence is observed on paired data; it never
        degrades into a single-asset anomaly label.
      detector:
        signal_definition: Detect a paired cross-asset spread dislocation using synchronized
          close series for the target asset and its declared paired asset.
        formula: 'ret_a[i] = log(close[i] / close[i-1])

          ret_b[i] = log(pair_close[i] / pair_close[i-1])

          basis[i] = ret_a[i] - ret_b[i]

          desync_z[i] = zscore(basis, lookback_window)[i]

          onset[i] = abs(desync_z[i]) >= threshold_z AND abs(desync_z[i-1]) < threshold_z'
        required_columns:
        - timestamp
        - close
        - pair_close
        lookback_bars: 2880
        warmup_bars: 96
        bar_type: bar_close
        timestamp_alignment: Event detected at bar close on the first paired bar that
          breaches the declared desynchronization threshold.
        minimum_sample_size: 96
      calibration:
        default_threshold: 3.0
        search_range:
        - 2.0
        - 2.5
        - 3.0
        - 3.5
        - 4.0
        calibration_target: Select the smallest threshold that preserves pair-specific
          stability while maintaining acceptable event counts across major pairs.
        stability_requirement: Threshold must remain within one z-score step across
          calibration splits for the same pair universe.
        failure_modes:
        - Missing paired series: detector disabled and emits no event
        - Pair definition drift: apparent spread may reflect a bad pair mapping rather
            than true desync
        - Stale reference feed: spread inflation is a data artifact
      expected_behavior:
        holding_horizon_bars: 1-24
        invalidation_conditions:
        - Paired spread mean-reverts below 1.0 z-score before follow-through develops
        - Pair relationship breaks structurally because the reference asset regime
          changed
        false_positive_scenarios:
        - Pair close derived from asynchronous venues
        - Single-asset shock incorrectly joined to a stale paired series
        disabled_regimes:
        - SCHEDULED_NEWS_WINDOW_EVENT active on only one leg: flow is event-specific
            rather than cross-asset desync
        - Missing pair_close coverage: event meaning cannot be proven
        expected_overlap:
        - CROSS_VENUE_DESYNC: can co-occur when one asset also splits across venues
        - VOL_SHOCK: moderate overlap when pair divergence emerges during volatility
            regime shifts
      lookback_window: 2880
      threshold_z: 3.0
      min_pair_observations: 96
      cooldown_bars: 24
    templates:
    - desync_repair
    - convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
    horizons:
    - 5m
    - 15m
    - 60m
    max_candidates_per_run: 600
  CROSS_VENUE_DESYNC:
    canonical_family: BASIS_FUNDING_DISLOCATION
    canonical_regime: BASIS_FUNDING_DISLOCATION
    legacy_family: CROSS_VENUE_DESYNC
    subtype: cross_venue_desync
    phase: persistence
    evidence_mode: inferred_cross_asset
    layer: canonical
    disposition: merge
    asset_scope: single_asset
    venue_scope: cross_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 90
    notes: Cross-venue basis persistence folded into basis/funding dislocation.
    reports_dir: cross_venue_desync
    events_file: cross_venue_desync_events.parquet
    signal_column: cross_venue_desync_event
    parameters:
      synthetic_coverage: covered
      canonical_family: INFORMATION_DESYNC
      detector_contract: true
      detector:
        signal_definition: 'Detects cross-venue price desynchronization: spot-perp
          basis (or inter-exchange basis) exceeds its extreme quantile, indicating
          one venue is lagging price discovery. Event exits when basis z-score reverts.

          '
        formula: 'basis[i]       = perp_close[i] - spot_close[i]

          basis_z[i]     = (basis[i] - mean(basis, basis_lookback)) / std(basis, basis_lookback)

          shock_th       = quantile(abs(basis_z), anchor_quantile) over basis_lookback

          shock_flag[i]  = abs(basis_z[i]) >= shock_th

          revert_flag[i] = abs(basis_z[i]) <= revert_z

          event onset    = shock_flag transitions False to True

          event exit     = first subsequent bar where revert_flag = True (capped at
          window_end)

          '
        required_columns:
        - timestamp
        - close_spot
        - close_perp
        lookback_bars: 96
        warmup_bars: 96
        bar_type: bar_close
        timestamp_alignment: 'Event detected at bar close of onset bar. window_end
          caps maximum event duration in bars.

          '
        minimum_sample_size: 96
      calibration:
        default_threshold: 0.99
        search_range:
        - 0.95
        - 0.97
        - 0.98
        - 0.99
        - 0.995
        calibration_target: 'Maximize information ratio of mean-reversion return within
          window_end bars. Require at least 40 events per asset over calibration window.

          '
        stability_requirement: 'anchor_quantile consistent across BTC/ETH spot-perp
          pairs within 0.01. Hit rate of reversion within window_end > 55% on both
          halves.

          '
        failure_modes:
        - Single-venue data: basis undefined, detector disabled
        - Stale perp data feed: basis appears large but is a data artifact
        - Funding payment bar: basis jumps mechanically at funding timestamps
      expected_behavior:
        holding_horizon_bars: 1-32
        invalidation_conditions:
        - Basis continues expanding beyond 2x onset z-score (no reversion setup)
        - New shock within window_end bars of prior event
        false_positive_scenarios:
        - Funding payment timestamps: instantaneous basis jump with no trading edge
        - Low-volume altcoins: basis is noise-driven, not informational
        - Market open: basis may be mechanically elevated at session start
        disabled_regimes:
        - FUNDING_TIMESTAMP_EVENT active: basis jump is mechanical
        - SPREAD_BLOWOUT active: execution cost exceeds basis reversion profit
        expected_overlap:
        - SPOT_PERP_BASIS_SHOCK: high co-occurrence; conceptually related
        - LIQUIDATION_CASCADE: moderate; cascade can create cross-venue desync
        - LIQUIDITY_VACUUM: low; different causal mechanism
      trigger: Detector triggers on cross venue desync pattern
      confirmation: Post-detection price action confirms signal validity
      cluster_id: desync
      window_end: 32
      anchor_mode: basis_shock
      anchor_quantile: 0.995
      revert_z: 0.5
      basis_lookback: 96
      persistence_bars: 2
      min_basis_bps: 35.0
    templates:
    - desync_repair
    - convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
    horizons:
    - 5m
