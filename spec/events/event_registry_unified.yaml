version: 1
kind: event_unified_registry
metadata:
  status: authoritative
  legacy_sources:
    event_defaults: spec/events/_defaults.yaml
    event_family_defaults: spec/events/_families.yaml
    event_specs_dir: spec/events
    canonical_event_registry: spec/events/canonical_event_registry.yaml
    template_registry: spec/templates/event_template_registry.yaml
    event_ontology_mapping: spec/events/event_ontology_mapping.yaml
  notes: Single event-centric schema for phase1+phase2 composition. Legacy specs retained
    for compatibility and drift checks. canonical_family is a staged compatibility
    alias of canonical_regime; legacy_family preserves current family-default wiring.
defaults:
  parameters:
    merge_gap_bars: 1
    cooldown_bars: 0
    anchor_rule: max_intensity
    min_occurrences: 0
  templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - pullback_entry
  horizons:
  - 5m
  - 15m
  - 60m
  conditioning_cols:
  - vol_regime
  - carry_state
  - funding_bps
  - ms_trend_state
  - ms_spread_state
  - severity_bucket
  max_candidates_per_run: 1000
