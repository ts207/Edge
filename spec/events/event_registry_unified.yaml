    - drawdown_filter
    - tail_risk_avoid
    horizons:
    - 60m
    max_candidates_per_run: 350
  CLIMAX_VOLUME_BAR:
    canonical_family: FORCED_FLOW_AND_EXHAUSTION
    reports_dir: forced_flow_and_exhaustion
    events_file: forced_flow_and_exhaustion_events.parquet
    signal_column: climax_volume_bar_event
    parameters:
      synthetic_coverage: covered
      canonical_family: FORCED_FLOW_AND_EXHAUSTION
      liquidation_spike_z_threshold: 3.0
      cascade_window_bars: 12
      cooldown_bars: 24
      merge_gap_bars: 0
    templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - drawdown_filter
    horizons:
    - 60m
    max_candidates_per_run: 500
  COPULA_PAIRS_TRADING:
    canonical_family: STATISTICAL_DISLOCATION
    reports_dir: copula_pairs
    events_file: copula_pairs_events.parquet
    signal_column: copula_pairs_trading_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: STATISTICAL_DISLOCATION
      alpha1: 0.05
      alpha2: 0.95
      lookback_window: 288
      cooldown_bars: 12
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
    horizons:
    - 15m
    - 60m
    max_candidates_per_run: 350
  CORRELATION_BREAKDOWN_EVENT:
    canonical_family: REGIME_TRANSITION
    reports_dir: regime_transition
    events_file: regime_transition_events.parquet
    signal_column: correlation_breakdown_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: REGIME_TRANSITION
      regime_window: 288
      transition_z_threshold: 2.5
      cooldown_bars: 48
      merge_gap_bars: 0
    templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
    horizons:
    - 60m
    max_candidates_per_run: 350
  CROSS_VENUE_DESYNC:
    canonical_family: INFORMATION_DESYNC
    reports_dir: cross_venue_desync
    events_file: cross_venue_desync_events.parquet
    signal_column: cross_venue_desync_event
    parameters:
      synthetic_coverage: covered
      canonical_family: INFORMATION_DESYNC
      detector_contract: true
      detector:
        signal_definition: 'Detects cross-venue price desynchronization: spot-perp
          basis (or inter-exchange basis) exceeds its extreme quantile, indicating
          one venue is lagging price discovery. Event exits when basis z-score reverts.

          '
        formula: 'basis[i]       = perp_close[i] - spot_close[i]

          basis_z[i]     = (basis[i] - mean(basis, basis_lookback)) / std(basis, basis_lookback)

          shock_th       = quantile(abs(basis_z), anchor_quantile) over basis_lookback

          shock_flag[i]  = abs(basis_z[i]) >= shock_th

          revert_flag[i] = abs(basis_z[i]) <= revert_z

          event onset    = shock_flag transitions False to True

          event exit     = first subsequent bar where revert_flag = True (capped at
          window_end)

          '
        required_columns:
        - timestamp
        - close_spot
        - close_perp
        lookback_bars: 96
        warmup_bars: 96
        bar_type: bar_close
        timestamp_alignment: 'Event detected at bar close of onset bar. window_end
          caps maximum event duration in bars.

          '
        minimum_sample_size: 96
      calibration:
        default_threshold: 0.99
        search_range:
        - 0.95
        - 0.97
        - 0.98
        - 0.99
        - 0.995
        calibration_target: 'Maximize information ratio of mean-reversion return within
          window_end bars. Require at least 40 events per asset over calibration window.

          '
        stability_requirement: 'anchor_quantile consistent across BTC/ETH spot-perp
          pairs within 0.01. Hit rate of reversion within window_end > 55% on both
          halves.

          '
        failure_modes:
        - Single-venue data: basis undefined, detector disabled
        - Stale perp data feed: basis appears large but is a data artifact
        - Funding payment bar: basis jumps mechanically at funding timestamps
      expected_behavior:
        holding_horizon_bars: 1-32
        invalidation_conditions:
        - Basis continues expanding beyond 2x onset z-score (no reversion setup)
        - New shock within window_end bars of prior event
        false_positive_scenarios:
        - Funding payment timestamps: instantaneous basis jump with no trading edge
        - Low-volume altcoins: basis is noise-driven, not informational
        - Market open: basis may be mechanically elevated at session start
        disabled_regimes:
        - FUNDING_TIMESTAMP_EVENT active: basis jump is mechanical
        - SPREAD_BLOWOUT active: execution cost exceeds basis reversion profit
        expected_overlap:
        - SPOT_PERP_BASIS_SHOCK: high co-occurrence; conceptually related
        - LIQUIDATION_CASCADE: moderate; cascade can create cross-venue desync
        - LIQUIDITY_VACUUM: low; different causal mechanism
      window_end: 32
      anchor_mode: basis_shock
      anchor_quantile: 0.99
      revert_z: 0.5
      basis_lookback: 96
    templates:
    - desync_repair
    - convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
    horizons:
    - 5m
    - 15m
    - 60m
    max_candidates_per_run: 600
  DELEVERAGING_WAVE:
    canonical_family: POSITIONING_EXTREMES
    reports_dir: positioning_extremes
    events_file: positioning_extremes_events.parquet
    signal_column: deleveraging_wave_event
    parameters:
      synthetic_coverage: covered
      canonical_family: POSITIONING_EXTREMES
      funding_extreme_quantile: 0.99
      oi_change_z_threshold: 3.0
      cooldown_bars: 24
      merge_gap_bars: 0
    templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
    horizons:
    - 5m
    - 60m
    max_candidates_per_run: 500
  DEPTH_COLLAPSE:
    canonical_family: LIQUIDITY_DISLOCATION
    reports_dir: liquidity_dislocation
    events_file: liquidity_dislocation_events.parquet
    signal_column: depth_collapse_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: LIQUIDITY_DISLOCATION
      lookback_window: 288
      z_threshold: 3.0
      cooldown_bars: 12
      merge_gap_bars: 0
      min_volume_quantile: 0.2
    templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
    horizons:
    - 15m
    max_candidates_per_run: 600
  DEPTH_STRESS_PROXY:
    canonical_family: DEPTH_STRESS_PROXY
    reports_dir: liquidity_dislocation
    events_file: liquidity_dislocation_events.parquet
    signal_column: depth_stress_proxy_event
    parameters:
      synthetic_coverage: covered
      canonical_family: LIQUIDITY_DISLOCATION
      window: 288
      spread_quantile: 0.99
      rv_quantile: 0.9
      depth_quantile: 0.93
      min_history_bars: 288
      cooldown_bars: 96
      merge_gap_bars: 0
  FAILED_CONTINUATION:
    canonical_family: FORCED_FLOW_AND_EXHAUSTION
    reports_dir: forced_flow_and_exhaustion
    events_file: forced_flow_and_exhaustion_events.parquet
    signal_column: failed_continuation_event
    parameters:
      synthetic_coverage: covered
      canonical_family: FORCED_FLOW_AND_EXHAUSTION
      liquidation_spike_z_threshold: 3.0
      cascade_window_bars: 12
      cooldown_bars: 24
      merge_gap_bars: 0
    templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - drawdown_filter
    horizons:
    - 60m
    max_candidates_per_run: 500
  FALSE_BREAKOUT:
    canonical_family: TREND_STRUCTURE
    reports_dir: trend_structure
    events_file: trend_structure_events.parquet
    signal_column: false_breakout_event
    parameters:
      synthetic_coverage: covered
      canonical_family: TREND_STRUCTURE
      trend_window: 288
      breakout_z_threshold: 2.5
      cooldown_bars: 12
      merge_gap_bars: 0
    templates:
    - breakout_followthrough
    - false_breakout_reversal
    - pullback_entry
    - trend_continuation
    - continuation
    - only_if_trend
    horizons:
    - 15m
    - 60m
    max_candidates_per_run: 450
  FEE_REGIME_CHANGE_EVENT:
    canonical_family: EXECUTION_FRICTION
    reports_dir: execution_friction
    events_file: execution_friction_events.parquet
    signal_column: fee_regime_change_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: EXECUTION_FRICTION
      spread_z_threshold: 3.0
      slippage_z_threshold: 3.0
      cooldown_bars: 12
      merge_gap_bars: 0
    templates:
    - slippage_aware_filter
    - tail_risk_avoid
    horizons:
    - 5m
    - 15m
    max_candidates_per_run: 300
  FLOW_EXHAUSTION_PROXY:
    canonical_family: FLOW_EXHAUSTION_PROXY
    reports_dir: forced_flow_and_exhaustion
    events_file: forced_flow_and_exhaustion_events.parquet
    signal_column: flow_exhaustion_proxy_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: FORCED_FLOW_AND_EXHAUSTION
      lookback_window: 288
      z_threshold: 3.0
      cooldown_bars: 12
      merge_gap_bars: 0
  FND_DISLOC:
    canonical_family: STATISTICAL_DISLOCATION
    reports_dir: funding_dislocation
    events_file: funding_dislocation_events.parquet
    signal_column: funding_dislocation_event
    parameters:
      synthetic_coverage: covered
      notes:
      - '`threshold_bps` is expressed in basis points and is converted against decimal
        `funding_rate_scaled` values at runtime.'
      canonical_family: STATISTICAL_DISLOCATION
      threshold_bps: 2.0
      funding_quantile: 0.95
      alignment_window: 3
      cooldown_bars: 12
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
    horizons:
    - 15m
    - 60m
    max_candidates_per_run: 350
  FORCED_FLOW_EXHAUSTION:
    canonical_family: FORCED_FLOW_AND_EXHAUSTION
    reports_dir: directional_exhaustion_after_forced_flow
    events_file: directional_exhaustion_after_forced_flow_events.parquet
    signal_column: forced_flow_exhaustion_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: FORCED_FLOW_AND_EXHAUSTION
      window_end: 32
      anchor_mode: taker_imbalance
      anchor_quantile: 0.99
    templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - drawdown_filter
    horizons:
    - 60m
    max_candidates_per_run: 500
  FUNDING_EXTREME_ONSET:
    canonical_family: POSITIONING_EXTREMES
    reports_dir: funding_events
    events_file: funding_episode_events.parquet
    signal_column: funding_extreme_onset_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: POSITIONING_EXTREMES
      detector_contract: true
      detector:
        signal_definition: 'Detects the onset of a funding rate extreme: funding crosses
          the extreme_pct percentile of its rolling history AND shows acceleration
          (accel_pct of recent delta distribution). Requires persistence across persistence_bars
          intervals.

          '
        formula: 'funding_pct_rank[i] = percentile_rank(funding_rate[i], lookback=funding_pct_window)

          accel[i]            = funding_rate[i] - funding_rate[i - accel_lookback]

          accel_pct_rank[i]   = percentile_rank(accel[i], lookback=funding_pct_window)

          extreme_flag[i]     = (funding_pct_rank[i] >= extreme_pct / 100)

          accel_flag[i]       = (accel_pct_rank[i] >= accel_pct / 100)

          persist_flag[i]     = all(extreme_flag[i-k] for k in 0..persistence_bars-1)

          event onset         = first bar where extreme_flag AND accel_flag AND persist_flag

          '
        required_columns:
        - timestamp
        - funding_rate
        lookback_bars: 2880
        warmup_bars: 2880
        bar_type: bar_close
        timestamp_alignment: 'Event detected at bar close when all conditions first
          simultaneously satisfied. No intrabar data used.

          '
        minimum_sample_size: 100
      calibration:
        default_threshold: 95.0
        search_range:
        - 85.0
        - 90.0
        - 92.0
        - 95.0
        - 97.0
        - 99.0
        calibration_target: 'Maximize AUC of forward return vs funding normalization
          probability. Require at least min_hazard_events = 50 events over calibration
          window.

          '
        stability_requirement: 'Threshold must produce >= 30 events on both first-half
          and second-half of in-sample period. Threshold deviation across assets <
          5 percentile points.

          '
        failure_modes:
        - Funding data gaps >5% of bars: percentile ranking unstable
        - Near-zero funding regime: percentile compression, all ranks cluster at 50th
        - Funding rate regime change (exchange policy change): recalibrate required
      expected_behavior:
        holding_horizon_bars: 48-288
        invalidation_conditions:
        - Funding rate drops below normalization_pct within normalization_lookback
          bars
        - OI increases significantly (new longs entering, not an exhaustion setup)
        false_positive_scenarios:
        - Anticipated funding resets (8h schedule): onset may be mechanistic not informational
        - Low-OI instruments: funding extremes do not cause forced liquidations
        - Regime of persistent one-sided funding (trending market)
        disabled_regimes:
        - DELEVERAGING_WAVE active and unresolved: already in exhaustion
        - CHOP_TO_TREND_SHIFT: trend onset may reinforce funding direction, not reverse
        expected_overlap:
        - OI_FLUSH: high co-occurrence; OI flush often follows funding extreme
        - LIQUIDATION_CASCADE: moderate co-occurrence if extreme is on losing side
        - SPREAD_BLOWOUT: low co-occurrence; funding and spread are independent signals
      funding_pct_window: 2880
      extreme_pct: 95.0
      accel_pct: 95.0
      accel_lookback: 32
      persistence_pct: 85.0
      persistence_bars: 12
      normalization_pct: 50.0
      normalization_lookback: 96
      min_event_spacing: 96
      event_lookahead: 96
      liquidation_abs_return: 0.03
      drawdown_abs_return: 0.03
      vol_burst_quantile: 0.9
      htf_window: 384
      htf_lookback: 96
      pre_window: 96
      post_window: 96
      baseline_samples_per_event: 3
      baseline_seed: 7
      vol_auc_horizon: 8
      liq_auc_horizon: 96
      phase_tolerance_bars: 16
      crossover_confirm_bars: 4
      auc_bootstrap_iters: 2000
      accel_quantile: 0.995
      accel_persistence_intervals: 2
      accel_near_zero_cutoff: 5
      persistence_norm_horizon: 96
      interaction_min_rows_per_year: 150
      min_hazard_events: 50
    templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
    horizons:
    - 5m
    - 60m
    max_candidates_per_run: 500
  FUNDING_FLIP:
    canonical_family: POSITIONING_EXTREMES
    reports_dir: positioning_extremes
    events_file: positioning_extremes_events.parquet
    signal_column: funding_flip_event
    parameters:
      synthetic_coverage: covered
      canonical_family: POSITIONING_EXTREMES
      funding_extreme_quantile: 0.99
      oi_change_z_threshold: 3.0
      min_flip_abs: 0.00025
      persistence_bars: 2
      min_spacing: 24
      cooldown_bars: 24
      merge_gap_bars: 0
    templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
    horizons:
    - 5m
    - 60m
    max_candidates_per_run: 500
  FUNDING_NORMALIZATION_TRIGGER:
    canonical_family: POSITIONING_EXTREMES
    reports_dir: funding_events
    events_file: funding_episode_events.parquet
    signal_column: funding_normalization_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: POSITIONING_EXTREMES
      funding_pct_window: 2880
      extreme_pct: 95.0
      accel_pct: 95.0
      accel_lookback: 32
      persistence_pct: 85.0
      persistence_bars: 12
      normalization_pct: 50.0
      normalization_lookback: 96
      min_event_spacing: 96
      event_lookahead: 96
      liquidation_abs_return: 0.03
      drawdown_abs_return: 0.03
      vol_burst_quantile: 0.9
      htf_window: 384
      htf_lookback: 96
      pre_window: 96
      post_window: 96
      baseline_samples_per_event: 3
      baseline_seed: 7
      vol_auc_horizon: 8
      liq_auc_horizon: 96
      phase_tolerance_bars: 16
      crossover_confirm_bars: 4
