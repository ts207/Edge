version: 1
kind: event_unified_registry
metadata:
  status: authoritative
  legacy_sources:
    event_defaults: spec/events/_defaults.yaml
    event_family_defaults: spec/events/_families.yaml
    event_specs_dir: spec/events
    canonical_event_registry: spec/events/canonical_event_registry.yaml
    template_registry: spec/templates/event_template_registry.yaml
  notes: Single event-centric schema for phase1+phase2 composition. Legacy specs retained
    for compatibility and drift checks.
defaults:
  parameters:
    merge_gap_bars: 1
    cooldown_bars: 0
    anchor_rule: max_intensity
    min_occurrences: 0
  templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - pullback_entry
  horizons:
  - 5m
  - 15m
  - 60m
  conditioning_cols:
  - vol_regime
  - carry_state
  - funding_bps
  - ms_trend_state
  - ms_spread_state
  - severity_bucket
  max_candidates_per_run: 1000
families:
  ABSORPTION_PROXY:
    parameters: {}
  DEPTH_STRESS_PROXY:
    parameters: {}
  EXECUTION_FRICTION:
    parameters: {}
    templates:
    - slippage_aware_filter
    - tail_risk_avoid
  FLOW_EXHAUSTION_PROXY:
    parameters: {}
  FORCED_FLOW_AND_EXHAUSTION:
    parameters: {}
  INFORMATION_DESYNC:
    parameters: {}
    templates:
    - desync_repair
    - convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
    - basis_convergence
  LIQUIDATION_EXHAUSTION_REVERSAL:
    parameters: {}
  LIQUIDITY_DISLOCATION:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
    - liquidity_replenishment
  LIQUIDITY_STRESS_DIRECT:
    parameters: {}
  LIQUIDITY_STRESS_PROXY:
    parameters: {}
  POSITIONING_EXTREMES:
    parameters: {}
    templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
  POST_DELEVERAGING_REBOUND:
    parameters: {}
  PRICE_VOL_IMBALANCE_PROXY:
    parameters: {}
  REGIME_TRANSITION:
    parameters: {}
    templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
    - structural_regime_shift
  SEQ_FND_EXTREME_THEN_BREAKOUT:
    parameters: {}
  SEQ_LIQ_VACUUM_THEN_DEPTH_RECOVERY:
    parameters: {}
  SEQ_OI_SPIKEPOS_THEN_VOL_SPIKE:
    parameters: {}
  SEQ_VOL_COMP_THEN_BREAKOUT:
    parameters: {}
  STATISTICAL_DISLOCATION:
    parameters: {}
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
  TEMPORAL_STRUCTURE:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - tail_risk_avoid
    - only_if_no_news_window
  TREND_STRUCTURE:
    parameters: {}
    templates:
    - breakout_followthrough
    - false_breakout_reversal
    - pullback_entry
    - trend_continuation
    - continuation
    - only_if_trend
  VOLATILITY_TRANSITION:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - trend_continuation
    - volatility_expansion_follow
    - pullback_entry
    - only_if_regime
    - structural_regime_shift
  WICK_REVERSAL_PROXY:
    parameters: {}
events:
  ABSORPTION_PROXY:
    canonical_family: ABSORPTION_PROXY
    reports_dir: liquidity_dislocation
    events_file: liquidity_dislocation_events.parquet
    signal_column: absorption_proxy_event
    parameters:
      synthetic_coverage: covered
      canonical_family: LIQUIDITY_DISLOCATION
      window: 288
      spread_quantile: 0.965
      rv_quantile: 0.9
      imbalance_abs_quantile: 0.25
      min_history_bars: 288
      cooldown_bars: 96
      merge_gap_bars: 0
  BAND_BREAK:
    canonical_family: STATISTICAL_DISLOCATION
    reports_dir: statistical_dislocation
    events_file: statistical_dislocation_events.parquet
    signal_column: band_break_event
    parameters:
      synthetic_coverage: uncovered
      canonical_family: STATISTICAL_DISLOCATION
      lookback_window: 288
      band_z_threshold: 3.0
      cooldown_bars: 12
      merge_gap_bars: 0
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
    horizons:
    - 15m
    - 60m
    max_candidates_per_run: 350
  BASIS_DISLOC:
