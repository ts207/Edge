events:
  ABSORPTION_PROXY:
    canonical_family: LIQUIDITY_STRESS
    canonical_regime: LIQUIDITY_STRESS
    legacy_family: ABSORPTION_PROXY
    subtype: absorption
    phase: persistence
    evidence_mode: hybrid
    layer: canonical
    disposition: merge
    asset_scope: single_asset
    venue_scope: single_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 80
    notes: 'Hybrid liquidity-stress evidence: direct imbalance-stall confirmation
      combined with spread and RV stress.'
    reports_dir: liquidity_dislocation
    events_file: liquidity_dislocation_events.parquet
    signal_column: absorption_proxy_event
    parameters:
      maturity: standard
      synthetic_coverage: covered
      canonical_family: LIQUIDITY_DISLOCATION
      trigger: Detector triggers when direct imbalance stall confirms an absorption-style
        liquidity stress surface.
      confirmation: Spread and realized-volatility stress persist long enough to confirm
        the absorption signal.
      expected_behavior:
        holding_horizon_bars: 1-12
        invalidation_conditions:
        - Volume returns above median within 1-2 bars
        - Spread compresses back to baseline
        disabled_regimes:
        - 'SPREAD_BLOWOUT active: spread elevated, unreliable signal'
      cluster_id: liquidity_stress
      window: 288
      spread_quantile: 0.965
      rv_quantile: 0.9
      imbalance_abs_quantile: 0.25
      min_history_bars: 288
      cooldown_bars: 96
      merge_gap_bars: 0
    templates:
    - mean_reversion
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
    horizons:
    - 15m
    max_candidates_per_run: 600
  BAND_BREAK:
    canonical_family: STATISTICAL_STRETCH_OVERSHOOT
    canonical_regime: STATISTICAL_STRETCH_OVERSHOOT
    legacy_family: BAND_BREAK
    subtype: band_break
    phase: breakout
    evidence_mode: statistical
    layer: canonical
    disposition: merge
    asset_scope: single_asset
    venue_scope: single_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 60
    notes: Statistical band escape; retained as subtype under stretch/overshoot.
    reports_dir: statistical_dislocation
    events_file: statistical_dislocation_events.parquet
    signal_column: band_break_event
    parameters:
      synthetic_coverage: covered
      canonical_family: STATISTICAL_DISLOCATION
      trigger: Detector triggers on band break pattern
      confirmation: Post-detection price action confirms signal validity
      expected_behavior:
        holding_horizon_bars: 6-36
        invalidation_conditions:
        - Basis normalizes within horizon
        - Z-score returns to mean
        disabled_regimes:
        - 'Low basis volatility: z-score undefined'
      cluster_id: statistical_stretch
      lookback_window: 288
      band_z_threshold: 3.0
      cooldown_bars: 12
      merge_gap_bars: 0
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
    horizons:
    - 15m
    - 60m
    max_candidates_per_run: 350
  BASIS_DISLOC:
    canonical_family: BASIS_FUNDING_DISLOCATION
    canonical_regime: BASIS_FUNDING_DISLOCATION
    legacy_family: BASIS_DISLOC
    subtype: basis_dislocation
    phase: shock
    evidence_mode: statistical
    layer: canonical
    disposition: merge
    asset_scope: single_asset
    venue_scope: cross_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 90
    notes: Canonical basis dislocation surface.
    reports_dir: basis_dislocation
    events_file: basis_dislocation_events.parquet
    signal_column: basis_dislocation_event
    parameters:
      synthetic_coverage: covered
      canonical_family: STATISTICAL_DISLOCATION
      trigger: Detector triggers on basis disloc pattern
      confirmation: Post-detection price action confirms signal validity
      expected_behavior:
        holding_horizon_bars: 6-36
        invalidation_conditions:
        - Basis normalizes within horizon
        - Z-score returns to mean
        disabled_regimes:
        - 'Low basis volatility: z-score undefined'
      cluster_id: basis_dislocation
      z_threshold: 5.0
      lookback_window: 288
      cooldown_bars: 12
      min_basis_bps: 10.0
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
    horizons:
    - 15m
    - 60m
    max_candidates_per_run: 350
  BETA_SPIKE_EVENT:
    canonical_family: REGIME_TRANSITION
    canonical_regime: REGIME_TRANSITION
    legacy_family: BETA_SPIKE_EVENT
    subtype: beta_spike
    phase: transition
    evidence_mode: inferred_cross_asset
    layer: canonical
    disposition: keep
    asset_scope: cross_asset
    venue_scope: multi_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 85
    notes: Cross-asset transition evidence via beta instability.
    reports_dir: regime_transition
    events_file: regime_transition_events.parquet
    signal_column: beta_spike_event
    parameters:
      synthetic_coverage: covered
      canonical_family: REGIME_TRANSITION
      trigger: Detector triggers on beta spike event pattern
      confirmation: Post-detection price action confirms signal validity
      expected_behavior:
        holding_horizon_bars: 12-72
        invalidation_conditions:
        - Regime reverts to prior state
        - Beta/correlation stabilizes
        disabled_regimes:
        - 'Stable regime: no transition to detect'
      cluster_id: regime_shift
      regime_window: 288
      transition_z_threshold: 2.5
      cooldown_bars: 48
      merge_gap_bars: 0
    templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
    horizons:
    - 60m
    max_candidates_per_run: 350
  BREAKOUT_TRIGGER:
    canonical_family: VOLATILITY_RELAXATION_COMPRESSION_RELEASE
    canonical_regime: VOLATILITY_RELAXATION_COMPRESSION_RELEASE
    legacy_family: BREAKOUT_TRIGGER
    subtype: breakout_trigger
    phase: breakout
    evidence_mode: hybrid
    layer: canonical
    disposition: merge
    asset_scope: single_asset
    venue_scope: single_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 75
    notes: Compression-release bridge event; not a standalone canonical regime.
    reports_dir: volatility_transition
    events_file: volatility_transition_events.parquet
    signal_column: breakout_trigger_event
    parameters:
      synthetic_coverage: covered
      canonical_family: VOLATILITY_TRANSITION
      trigger: Detector triggers on breakout trigger pattern
      confirmation: Post-detection price action confirms signal validity
      expected_behavior:
        holding_horizon_bars: 8-48
        invalidation_conditions:
        - Vol re-expands above threshold within horizon
        - Second shock occurs before resolution
        disabled_regimes:
        - 'Low volume: vol computation noise-dominated'
      cluster_id: trend_momentum
      vol_lookback_window: 96
      compression_ratio_max: 0.8
      compression_window: 6
      min_breakout_distance: 0.0015
      expansion_quantile: 0.85
      cooldown_bars: 12
      merge_gap_bars: 0
    templates:
    - mean_reversion
    - continuation
    - trend_continuation
    - volatility_expansion_follow
    - pullback_entry
    - only_if_regime
    horizons:
    - 60m
    max_candidates_per_run: 500
  CHOP_TO_TREND_SHIFT:
    canonical_family: REGIME_TRANSITION
    canonical_regime: REGIME_TRANSITION
    legacy_family: CHOP_TO_TREND_SHIFT
    subtype: chop_to_trend
    phase: transition
    evidence_mode: hybrid
    layer: canonical
    disposition: keep
    asset_scope: single_asset
    venue_scope: single_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 85
    notes: Transition from choppy to directional conditions.
    reports_dir: regime_transition
    events_file: regime_transition_events.parquet
    signal_column: chop_to_trend_shift_event
    parameters:
