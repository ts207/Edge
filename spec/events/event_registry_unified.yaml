        disabled_regimes:
        - 'Stable regime: no transition to detect'
      cluster_id: regime_shift
      regime_window: 288
      transition_z_threshold: 2.5
      cooldown_bars: 48
      merge_gap_bars: 0
    templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
    horizons:
    - 60m
    max_candidates_per_run: 350
  CLIMAX_VOLUME_BAR:
    canonical_family: TREND_FAILURE_EXHAUSTION
    canonical_regime: TREND_FAILURE_EXHAUSTION
    legacy_family: CLIMAX_VOLUME_BAR
    subtype: climax_volume
    phase: exhaustion
    evidence_mode: hybrid
    layer: canonical
    disposition: merge
    asset_scope: single_asset
    venue_scope: single_venue
    is_composite: false
    is_context_tag: false
    is_strategy_construct: false
    research_only: false
    strategy_only: false
    deconflict_priority: 70
