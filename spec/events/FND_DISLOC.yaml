event_type: FND_DISLOC
synthetic_coverage: covered
reports_dir: funding_dislocation
events_file: funding_dislocation_events.parquet
signal_column: funding_dislocation_event
description: Funding dislocation requires an extreme spot-perp basis event aligned
  with an extreme funding-rate move of the same sign.
parameters:
  threshold_bps: 2.0
  funding_quantile: 0.95
  alignment_window: 3
  cooldown_bars: 12
  min_basis_bps: 5.0
notes:
- '`threshold_bps` is expressed in basis points and is converted against decimal `funding_rate_scaled`
  values at runtime.'
canonical_family: STATISTICAL_DISLOCATION
trigger: Detector triggers on fnd disloc pattern
confirmation: Post-detection price action confirms signal validity
expected_behavior:
  holding_horizon_bars: 6-36
  invalidation_conditions:
  - Basis normalizes within horizon
  - Z-score returns to mean
  disabled_regimes:
  - 'Low basis volatility: z-score undefined'
cluster_id: basis_dislocation
