# Regime and State Registry
regimes:
  vol_regime: [low, high]
  carry_state: [funding_pos, funding_neg]
  ms_trend_state: [trend, chop]
  ms_spread_state: [tight, wide]

context_state_map:
  vol_regime:
    high: high_vol_regime
    low: low_vol_regime
  carry_state:
    funding_pos: funding_positive
    funding_neg: funding_negative
  ms_trend_state:
    trend: trend_active
    chop: chop_active
  ms_spread_state:
    tight: spread_tight
    wide: spread_wide
  liquidity_regime:
    low: low_liquidity_state
    refill: refill_lag_state
  funding_regime:
    crowded: crowding_state
    normalizing: funding_normalization_state
  trend_structure:
    trend: trending_state
    chop: chop_state
