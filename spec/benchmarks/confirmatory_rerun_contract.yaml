# Confirmatory Rerun Contract
# This defines the strict temporal and calibration requirements for high-trust benchmark verification.

contract:
  name: "bench_vol_shock_confirmatory"
  output_mode: "event_detector"
  observation_clock: "bar_close"
  decision_lag_bars: 1
  lookback_bars: 288
  uses_current_observation: false
  calibration_mode: "train_fit"
  fit_scope: "split_train_only"
  approved_primitives:
    - "ms_vol_state"
    - "ms_trend_state"
    - "funding_rate_scaled"
  notes: >
    Maintained confirmatory contract for VOL_SHOCK family.
    Ensures zero lookahead and stable regime fitting across reruns.
