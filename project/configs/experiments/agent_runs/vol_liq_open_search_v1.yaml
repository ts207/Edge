version: 1

program_id: vol_liq_open_search_v1
run_mode: research
description: Search continuation and fade behaviors for volatility and liquidity events near the open.

instrument_scope:
  instrument_classes: [crypto]
  symbols: [BTCUSDT, ETHUSDT]
  timeframe: 5m
  start: 2024-01-01
  end: 2024-06-30

trigger_space:
  allowed_trigger_types: [EVENT, SEQUENCE]

  events:
    include:
      - VOL_SPIKE
      - LIQUIDITY_GAP_PRINT
      - ORDERFLOW_IMBALANCE_SHOCK
    exclude: []

  sequences:
    max_length: 2
    include:
      - [VOL_SPIKE, LIQUIDITY_GAP_PRINT]
    max_gaps_bars: [1, 3, 6]

templates:
  include: [continuation, fade]

evaluation:
  horizons_bars: [1, 3, 6]
  directions: [long, short]
  entry_lags: [0, 1]

contexts:
  include:
    session: [open]
    regime: [stress, high_vol]
    liquidity_bucket: [high]
    news_window: [exclude]

search_control:
  max_hypotheses_total: 200
  max_hypotheses_per_template: 100
  max_hypotheses_per_event_family: 150
  random_seed: 42

promotion:
  enabled: true
  track: standard
  multiplicity_scope: program_id

artifacts:
  write_candidate_table: true
  write_hypothesis_log: true
  write_reports: true
