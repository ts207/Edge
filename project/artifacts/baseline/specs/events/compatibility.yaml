kind: event_compatibility
version: 1

# suppression_rules: when when_active event is present in the bar window,
# events in suppress list are penalized (penalty_factor) or hard-blocked (block: true).
suppression_rules:
  - when_active: SPREAD_BLOWOUT
    suppress:
      - LIQUIDITY_VACUUM
      - CROSS_VENUE_DESYNC
      - BREAKOUT_TRIGGER
      - RANGE_BREAKOUT
    penalty_factor: 0.3
    block: false
    reason: >
      Spread elevation makes execution-heavy mean-reversion templates uneconomic.
      Penalize heavily but do not block entirely.

  - when_active: SCHEDULED_NEWS_WINDOW_EVENT
    suppress:
      - LIQUIDITY_VACUUM
      - VOL_SHOCK
      - CROSS_VENUE_DESYNC
      - BREAKOUT_TRIGGER
    penalty_factor: 0.0
    block: true
    reason: >
      News window: directional information dominates; structural detectors fire
      spuriously. Block entirely during active news window.

  - when_active: FUNDING_TIMESTAMP_EVENT
    suppress:
      - CROSS_VENUE_DESYNC
      - BASIS_DISLOC
      - SPOT_PERP_BASIS_SHOCK
    penalty_factor: 0.0
    block: true
    reason: >
      Funding payment creates mechanical basis jump; desync detectors fire falsely.
      Block for the payment bar and its cooldown window.

  - when_active: DELEVERAGING_WAVE
    suppress:
      - TREND_ACCELERATION
      - BREAKOUT_TRIGGER
      - CHOP_TO_TREND_SHIFT
    penalty_factor: 0.2
    block: false
    reason: >
      Deleveraging price moves are forced liquidation artifacts, not genuine
      trend breakouts. Penalize continuation templates heavily.

  - when_active: LIQUIDITY_VACUUM
    suppress:
      - VOL_SHOCK
    penalty_factor: 0.5
    block: false
    reason: >
      Vol signal unreliable during thin-book conditions; vol expansion may be
      noise-driven. Partial penalty.

# composite_events: when all required events co-occur within co_occur_window_bars,
# emit a synthetic composite event at the primary event's timestamp.
composite_events:
  - name: EXHAUSTION_REVERSAL_SETUP
    required:
      - LIQUIDATION_CASCADE
      - OI_FLUSH
    stabilization_required: true
    stabilization_bars: 8
    co_occur_window_bars: 24
    description: >
      Liquidation cascade + OI flush co-occurrence after a stabilization window
      indicates forced flow has exhausted. Promotes exhaustion_reversal template.

  - name: FORCED_FLOW_DESYNC
    required:
      - CROSS_VENUE_DESYNC
      - SPREAD_BLOWOUT
    stabilization_required: false
    co_occur_window_bars: 8
    description: >
      Cross-venue desync + spread blowout: execution window is narrow.
      Only high-urgency templates should act.

  - name: TREND_CONTINUATION_CONFIRMED
    required:
      - TREND_ACCELERATION
      - VOL_CLUSTER_SHIFT
    stabilization_required: false
    liquidity_gate: not_thin
    co_occur_window_bars: 16
    description: >
      Trend acceleration + vol cluster shift + non-thin liquidity confirms
      continuation. Suppresses reversal templates.
